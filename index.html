<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FITQUEST | Elite Performance Coaching</title>
    <script>
      // Global error handler for better diagnostics
      window.onerror = function(message, source, lineno, colno, error) {
        console.error('Global Error:', { message, source, lineno, colno, error: error ? error.stack : null });
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('Unhandled Rejection:', event.reason);
      };
      
      // Prevent TypeError when polyfills try to overwrite fetch
      try {
        const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (descriptor && !descriptor.writable) {
          Object.defineProperty(window, 'fetch', {
            writable: true,
            configurable: true,
            value: window.fetch
          });
        }
      } catch (e) {
        console.warn('Could not make fetch writable:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
