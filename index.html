<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FITQUEST | Elite Performance Coaching</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 12h-4l-3 9L9 3l-3 9H2'/></svg>">
    <script>
      // Global error handler for better diagnostics
      window.onerror = function(message, source, lineno, colno, error) {
        console.error('Global Error:', { message, source, lineno, colno, error: error ? error.stack : null });
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('Unhandled Rejection:', event.reason);
      };

      // Diagnostic for fetch error
      try {
        const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
        console.log('Fetch descriptor:', descriptor);
        if (descriptor && !descriptor.configurable) {
          console.warn('window.fetch is not configurable');
        } else {
          // Try to protect it if it is configurable
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('Attempt to overwrite window.fetch blocked'); },
            configurable: false
          });
        }
      } catch (e) {
        console.error('Error checking/protecting fetch descriptor:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
